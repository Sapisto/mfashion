<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White circle background -->
  <circle cx="100" cy="100" r="98" fill="white" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Red ring border -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="#CC1111" stroke-width="8"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#CC1111" stroke-width="2"/>

  <!-- AIE cursive-style letters -->
  <text x="100" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="42"
    font-style="italic" font-weight="bold" fill="#CC1111"
    text-anchor="middle" letter-spacing="-2">AIE</text>

  <!-- Decorative swoosh under AIE -->
  <path d="M 58 100 Q 100 110 142 100" stroke="#CC1111" stroke-width="2" fill="none"/>

  <!-- CLOTHING bold text -->
  <text x="100" y="128" font-family="Arial Black, Arial, sans-serif" font-size="18"
    font-weight="900" fill="#222222" text-anchor="middle" letter-spacing="3">CLOTHING</text>

  <!-- TM mark -->
  <text x="148" y="118" font-family="Arial, sans-serif" font-size="8"
    fill="#222222">™</text>

  <!-- Tagline -->
  <text x="100" y="148" font-family="Georgia, serif" font-size="10"
    font-style="italic" fill="#666666" text-anchor="middle" letter-spacing="0.5">
    a style for everyone...
  </text>
</svg>